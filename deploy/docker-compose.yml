name: wx-private-media-upload

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_local
      POSTGRES_MIGRATION_PASSWORD: wx_migrate_local
      POSTGRES_RUNTIME_PASSWORD: wx_runtime_local
      POSTGRES_MAINTENANCE_PASSWORD: wx_maintenance_local
    ports:
      - '127.0.0.1:${POSTGRES_HOST_PORT:-55432}:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init-roles.sql:/docker-entrypoint-initdb.d/10-init-roles.sql:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d postgres']
      interval: 2s
      timeout: 3s
      retries: 30
    restart: unless-stopped

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address ':9001'
    environment:
      MINIO_ROOT_USER: minio_local
      MINIO_ROOT_PASSWORD: minio_local_secret
    ports:
      - '127.0.0.1:${MINIO_API_HOST_PORT:-59000}:9000'
      - '127.0.0.1:${MINIO_CONSOLE_HOST_PORT:-59001}:9001'
    volumes:
      - minio-data:/data
    healthcheck:
      test: ['CMD-SHELL', 'curl --fail --silent http://127.0.0.1:9000/minio/health/live']
      interval: 2s
      timeout: 3s
      retries: 30
    restart: unless-stopped

  minio-init:
    image: minio/mc:RELEASE.2025-04-16T18-13-26Z
    environment:
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ROOT_USER: minio_local
      MINIO_ROOT_PASSWORD: minio_local_secret
      MINIO_BUCKET: wx-private-media
    volumes:
      - ./minio/create-bucket.sh:/usr/local/bin/create-bucket.sh:ro
    entrypoint: ['/bin/sh', '/usr/local/bin/create-bucket.sh']
    depends_on:
      minio:
        condition: service_healthy
    restart: 'no'

volumes:
  postgres-data:
  minio-data:
