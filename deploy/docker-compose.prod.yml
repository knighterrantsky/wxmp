name: wx-private-media-upload-production

x-api-image: &api-image
  image: wx-private-media-upload-api:${IMAGE_TAG:-latest}
  build:
    context: ..
    dockerfile: deploy/api.Dockerfile

x-hardened-api: &hardened-api
  init: true
  read_only: true
  tmpfs:
    - /tmp:size=64m,mode=1777
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_ADMIN_PASSWORD:?POSTGRES_ADMIN_PASSWORD is required}
      POSTGRES_MIGRATION_PASSWORD: ${POSTGRES_MIGRATION_PASSWORD:?POSTGRES_MIGRATION_PASSWORD is required}
      POSTGRES_RUNTIME_PASSWORD: ${POSTGRES_RUNTIME_PASSWORD:?POSTGRES_RUNTIME_PASSWORD is required}
      POSTGRES_MAINTENANCE_PASSWORD: ${POSTGRES_MAINTENANCE_PASSWORD:?POSTGRES_MAINTENANCE_PASSWORD is required}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init-roles.sql:/docker-entrypoint-initdb.d/10-init-roles.sql:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d postgres']
      interval: 5s
      timeout: 3s
      retries: 30
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

  migrate:
    <<: [*api-image, *hardened-api]
    command: ['node', 'dist/db/migrate.js']
    environment:
      MIGRATION_DATABASE_URL: ${MIGRATION_DATABASE_URL:?MIGRATION_DATABASE_URL is required}
      DATABASE_RUNTIME_ROLE: wx_runtime
      DATABASE_MAINTENANCE_ROLE: wx_maintenance
    depends_on:
      postgres:
        condition: service_healthy
    restart: 'no'

  api:
    <<: [*api-image, *hardened-api]
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: '3000'
      TRUST_PROXY: '1'
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      MONITORING_TOKEN: ${MONITORING_TOKEN:?MONITORING_TOKEN is required}
      WECHAT_AUTH_MODE: real
      WECHAT_APP_ID: ${WECHAT_APP_ID:?WECHAT_APP_ID is required}
      WECHAT_APP_SECRET: ${WECHAT_APP_SECRET:?WECHAT_APP_SECRET is required}
      WECHAT_CODE2SESSION_ENDPOINT: https://api.weixin.qq.com/sns/jscode2session
      JWT_PRIVATE_KEY: ${JWT_PRIVATE_KEY:?JWT_PRIVATE_KEY is required}
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY:?JWT_PUBLIC_KEY is required}
      CURSOR_SIGNING_KEY: ${CURSOR_SIGNING_KEY:?CURSOR_SIGNING_KEY is required}
      R2_ENDPOINT: ${R2_ENDPOINT:?R2_ENDPOINT is required}
      R2_BUCKET: ${R2_BUCKET:?R2_BUCKET is required}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:?R2_ACCESS_KEY_ID is required}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:?R2_SECRET_ACCESS_KEY is required}
      R2_FORCE_PATH_STYLE: 'false'
    depends_on:
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test:
        - CMD
        - node
        - --input-type=module
        - --eval
        - const response = await fetch('http://127.0.0.1:3000/health/live'); if (!response.ok) process.exit(1)
      interval: 10s
      timeout: 3s
      retries: 12
      start_period: 10s
    stop_grace_period: 45s
    restart: unless-stopped

  nginx:
    image: nginx:1.30.3-alpine
    ports:
      - '${HTTPS_PORT:-443}:443'
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ${TLS_CERTIFICATE_FILE:?TLS_CERTIFICATE_FILE is required}:/etc/nginx/tls/tls.crt:ro
      - ${TLS_PRIVATE_KEY_FILE:?TLS_PRIVATE_KEY_FILE is required}:/etc/nginx/tls/tls.key:ro
    depends_on:
      api:
        condition: service_healthy
    read_only: true
    tmpfs:
      - /var/cache/nginx:size=32m
      - /var/run:size=1m
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped

  maintenance:
    <<: [*api-image, *hardened-api]
    profiles: [maintenance]
    command: ['node', 'dist/maintenance.js']
    environment:
      MAINTENANCE_DATABASE_URL: ${MAINTENANCE_DATABASE_URL:?MAINTENANCE_DATABASE_URL is required}
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: 'no'

volumes:
  postgres-data:
