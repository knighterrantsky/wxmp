name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-24.04
    timeout-minutes: 35
    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://wx_runtime:wx_runtime_local@127.0.0.1:55432/wx_upload
      MIGRATION_DATABASE_URL: postgresql://wx_migrate:wx_migrate_local@127.0.0.1:55432/wx_upload
      MAINTENANCE_DATABASE_URL: postgresql://wx_maintenance:wx_maintenance_local@127.0.0.1:55432/wx_upload
      DATABASE_RUNTIME_ROLE: wx_runtime
      DATABASE_MAINTENANCE_ROLE: wx_maintenance
      MINIO_ENDPOINT: http://127.0.0.1:59000
      MINIO_BUCKET: wx-private-media
      MINIO_ACCESS_KEY_ID: minio_local
      MINIO_SECRET_ACCESS_KEY: minio_local_secret
      R2_ENDPOINT: http://127.0.0.1:59000
      R2_BUCKET: wx-private-media
      R2_ACCESS_KEY_ID: minio_local
      R2_SECRET_ACCESS_KEY: minio_local_secret
      R2_FORCE_PATH_STYLE: 'true'
      WECHAT_AUTH_MODE: stub
      MONITORING_TOKEN: ci-only-monitoring-token
      PUBLIC_API_BASE_URL: https://api.ci.invalid

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Use Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Enable pinned pnpm
        run: |
          corepack enable
          pnpm --version

      - name: Install frozen dependencies
        run: pnpm install --frozen-lockfile

      - name: Start PostgreSQL 17 and private MinIO
        run: |
          docker compose -f deploy/docker-compose.yml up --detach --wait postgres minio
          docker compose -f deploy/docker-compose.yml run --rm minio-init

      - name: Run database migrations and grants
        run: |
          pnpm --filter @wx-upload/contracts build
          pnpm --filter @wx-upload/api db:migrate

      - name: Generate mini-program CI configuration
        run: pnpm --filter @wx-upload/miniprogram generate:config

      - name: Validate Compose configuration
        run: |
          docker compose -f deploy/docker-compose.yml config --quiet
          POSTGRES_ADMIN_PASSWORD=config-only-admin \
          POSTGRES_MIGRATION_PASSWORD=config-only-migrate \
          POSTGRES_RUNTIME_PASSWORD=config-only-runtime \
          POSTGRES_MAINTENANCE_PASSWORD=config-only-maintenance \
          DATABASE_URL=postgresql://wx_runtime:config-only-runtime@postgres:5432/wx_upload \
          MIGRATION_DATABASE_URL=postgresql://wx_migrate:config-only-migrate@postgres:5432/wx_upload \
          MAINTENANCE_DATABASE_URL=postgresql://wx_maintenance:config-only-maintenance@postgres:5432/wx_upload \
          MONITORING_TOKEN=config-only-monitoring-token-value \
          WECHAT_APP_ID=config-only-app-id \
          WECHAT_APP_SECRET=config-only-app-secret \
          JWT_PRIVATE_KEY=config-only-private-key \
          JWT_PUBLIC_KEY=config-only-public-key \
          CURSOR_SIGNING_KEY=config-only-cursor-key \
          R2_ENDPOINT=https://00000000000000000000000000000000.r2.cloudflarestorage.com \
          R2_BUCKET=config-only-private-bucket \
          R2_ACCESS_KEY_ID=config-only-access-key \
          R2_SECRET_ACCESS_KEY=config-only-secret-key \
          TLS_CERTIFICATE_FILE=/tmp/config-only-certificate.pem \
          TLS_PRIVATE_KEY_FILE=/tmp/config-only-private-key.pem \
          docker compose -f deploy/docker-compose.prod.yml config --quiet

      - name: Validate Nginx configuration
        run: |
          mkdir -p /tmp/wx-upload-nginx-tls
          openssl req -x509 -newkey rsa:2048 -nodes \
            -subj /CN=localhost \
            -keyout /tmp/wx-upload-nginx-tls/tls.key \
            -out /tmp/wx-upload-nginx-tls/tls.crt \
            -days 1 >/dev/null 2>&1
          docker run --rm --add-host api:127.0.0.1 \
            -v "$PWD/deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro" \
            -v /tmp/wx-upload-nginx-tls:/etc/nginx/tls:ro \
            nginx:1.30.3-alpine nginx -t

      - name: Check formatting
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Run unit and integration tests
        run: pnpm test

      - name: Run cross-end tests
        run: pnpm test:e2e:local

      - name: Build compiled artifacts
        run: pnpm build

      - name: Show dependency logs on failure
        if: failure()
        run: docker compose -f deploy/docker-compose.yml logs --no-color postgres minio

      - name: Stop local dependencies
        if: always()
        run: docker compose -f deploy/docker-compose.yml down --volumes
